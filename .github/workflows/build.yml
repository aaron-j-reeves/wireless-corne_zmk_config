on:
  push:
    paths-ignore:
      - "firmware/**"
  pull_request:
    paths-ignore:
      - "firmware/**"
  workflow_dispatch:

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main

  commit_firmware:
    name: Commit Firmware Artifacts
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Download merged firmware artifact
        uses: actions/download-artifact@v5
        with:
          name: firmware
          path: firmware-build

      - name: Sync firmware directory
        run: |
          rm -rf firmware
          mkdir -p firmware
          cp -R firmware-build/. firmware/

      - name: Commit firmware artifacts
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -z "$(git status --porcelain -- firmware)" ]; then
            echo "No firmware changes to commit."
            exit 0
          fi

          git add --all firmware
          git commit -m "chore: update firmware artifacts for ${GITHUB_SHA}" -m "Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          git push origin "HEAD:${BRANCH_NAME}"
